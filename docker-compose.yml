services:

  app:
    image: nextcloud:28-apache
    container_name: nextcloud_app
    restart: unless-stopped
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${DOMAIN}
      OVERWRITEPROTOCOL: https
      OVERWRITECLIURL: https://${DOMAIN}
    volumes:
      - ${EXTERNAL_PATH}/nextcloud/data:/var/www/html
    networks:
      - nextcloud_net

  nginx:
    image: nginx:alpine
    container_name: nextcloud_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${EXTERNAL_PATH}/nextcloud/certbot/conf:/etc/letsencrypt:ro
      - ${EXTERNAL_PATH}/nextcloud/certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - nextcloud_net

  certbot:
    image: certbot/certbot
    container_name: nextcloud_certbot
    volumes:
      - ${EXTERNAL_PATH}/nextcloud/certbot/conf:/etc/letsencrypt
      - ${EXTERNAL_PATH}/nextcloud/certbot/www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"

  duckdns:
    image: linuxserver/duckdns
    container_name: nextcloud_duckdns
    restart: unless-stopped
    environment:
      - SUBDOMAINS=${DUCKDNS_SUBDOMAIN}
      - TOKEN=${DUCKDNS_TOKEN}
      - TZ=Europe/Paris
    networks:
      - nextcloud_net

networks:
  nextcloud_net:
    driver: bridge
